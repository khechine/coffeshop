worker_processes auto;
events { worker_connections 1024; }
http {
  sendfile on;
  tcp_nodelay on;
  tcp_nopush on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 10M;

  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  resolver 127.0.0.11 ipv6=off;

  upstream web { zone web 64k; server web:3000 resolve; }
  upstream vendor { zone vendor 64k; server vendor-portal:3002 resolve; }
  upstream admin { zone admin 64k; server admin:3004 resolve; }
  upstream api { zone api 64k; server api:3001 resolve; }
  
  upstream repair { zone repair 64k; server repair-app:80 resolve; }
  upstream courier { zone courier 64k; server courier-app:80 resolve; }

  # Coffeeshop upstreams
  upstream coffeeshop_dashboard { zone coffeeshop_dashboard 64k; server coffeeshop_dashboard:3000 resolve; }
  upstream coffeeshop_api { zone coffeeshop_api 64k; server coffeeshop_api:3001 resolve; }

  # Main Site & Default
  server {
    listen 80;
    server_name nahjathina.com www.nahjathina.com;

    location ^~ /.well-known/acme-challenge/ { return 200; }
    return 301 https://$host$request_uri;
  }

  # HTTPS Main Site
  server {
    listen 443 ssl;
    server_name nahjathina.com www.nahjathina.com;
    ssl_certificate /etc/letsencrypt/live/nahjathina.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nahjathina.com/privkey.pem;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /uploads/ {
      alias /var/www/uploads/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # WebSocket support
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      client_max_body_size 10M;
    }

    location /socket.io/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

