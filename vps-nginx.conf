        return 200 '<!DOCTYPE html><html><head><title>Welcome</title><style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background-color:#f7f9fc;color:#333;}.container{text-align:center;padding:40px;background:white;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.1);}h1{margin-top:0;color:#2c3e50;}p{color:#7f8c8d;}</style></head><body><div class="container"><h1>Welcome</h1><p>This server is successfully configured.</p></div></body></html>';
    }
