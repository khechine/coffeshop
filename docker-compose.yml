version: '3.8'

services:
  coffeeshop_db:
    image: postgres:15
    container_name: coffeeshop_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-coffeeshop}
    ports:
      - '5432:5432'
    volumes:
      - coffeeshop_pgdata:/var/lib/postgresql/data

  dashboard:
    build: .
    container_name: coffeeshop_dashboard
    restart: always
    command: ["pnpm", "--filter", "@coffeeshop/admin-dashboard", "start", "-p", "3000"]
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@coffeeshop_db:5432/${POSTGRES_DB:-coffeeshop}?schema=public
      JWT_SECRET: ${JWT_SECRET:-supers3cr3tc0ffeesh0p}
      PORT: 3000
    depends_on:
      - coffeeshop_db

  api:
    build: .
    container_name: coffeeshop_api
    restart: always
    command: ["pnpm", "--filter", "@coffeeshop/api", "start"]
    expose:
      - "3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@coffeeshop_db:5432/${POSTGRES_DB:-coffeeshop}?schema=public
      JWT_SECRET: ${JWT_SECRET:-supers3cr3tc0ffeesh0p}
      PORT: 3001
    depends_on:
      - coffeeshop_db

  nginx:
    image: nginx:alpine
    container_name: coffeeshop_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - dashboard
      - api

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  coffeeshop_pgdata:
