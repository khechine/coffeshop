version: '3.8'

services:
  coffeeshop_db:
    image: postgres:15
    container_name: coffeeshop_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-coffeeshop}
    env_file:
      - .env
    volumes:
      - coffeeshop_pgdata:/var/lib/postgresql/data
    networks:
      - default

  dashboard:
    build: .
    container_name: coffeeshop_dashboard
    restart: always
    command: ["pnpm", "--filter", "@coffeeshop/admin-dashboard", "start"]
    ports:
      - "3050:3005"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@coffeeshop_db:5432/${POSTGRES_DB:-coffeeshop}?schema=public
      JWT_SECRET: ${JWT_SECRET:-supers3cr3tc0ffeesh0p}
      PORT: 3005
    depends_on:
      - coffeeshop_db
    networks:
      - default
      - marketplace_default

  api:
    build: .
    container_name: coffeeshop_api
    restart: always
    command: ["pnpm", "--filter", "@coffeeshop/api", "start"]
    ports:
      - "3051:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@coffeeshop_db:5432/${POSTGRES_DB:-coffeeshop}?schema=public
      JWT_SECRET: ${JWT_SECRET:-supers3cr3tc0ffeesh0p}
      PORT: 3001
      PRISMA_CLI_BINARY_TARGETS: "debian-openssl-3.0.x"
      UPLOAD_DIR: /app/apps/api/public/uploads
    depends_on:
      - coffeeshop_db
    volumes:
      - coffeeshop_uploads:/app/apps/api/public/uploads
    networks:
      - default
      - marketplace_default

  nginx:
    image: nginx:alpine
    container_name: coffeeshop_nginx
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/rachma-lite:/usr/share/nginx/html/rachma-lite:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - dashboard
      - api
    networks:
      - default

volumes:
  coffeeshop_pgdata:
  coffeeshop_uploads:

networks:
  default:
  marketplace_default:
    external: true

